<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RealTime Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    #login-screen { text-align: center; }
    #login-screen h1 { font-size: 2rem; margin-bottom: 1rem; color: #e94560; }
    #login-screen input { padding: 10px 16px; border-radius: 8px; border: none; font-size: 1rem; margin: 6px; width: 220px; }
    #login-screen button { padding: 10px 24px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 6px; }

    #chat-screen { display: none; width: 100%; max-width: 900px; height: 90vh; flex-direction: row; gap: 12px; padding: 12px; }

    /* Sidebar */
    #sidebar { width: 200px; background: #16213e; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    #sidebar h3 { color: #e94560; font-size: 0.9rem; text-transform: uppercase; }
    .room-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #0f3460; color: #eee; cursor: pointer; text-align: left; font-size: 0.9rem; transition: background 0.2s; }
    .room-btn:hover, .room-btn.active { background: #e94560; }
    #online-users { font-size: 0.8rem; color: #aaa; }
    .online-user { padding: 4px 0; border-bottom: 1px solid #0f3460; }

    /* Chat area */
    #chat-area { flex: 1; display: flex; flex-direction: column; background: #16213e; border-radius: 12px; overflow: hidden; }
    #chat-header { padding: 14px 18px; background: #0f3460; font-weight: bold; font-size: 1rem; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; }
    .message.mine { align-self: flex-end; background: #e94560; }
    .message.theirs { align-self: flex-start; background: #0f3460; }
    .message .meta { font-size: 0.75rem; opacity: 0.7; margin-bottom: 4px; }
    .system-msg { text-align: center; font-size: 0.8rem; color: #aaa; font-style: italic; }
    #typing-indicator { padding: 6px 18px; font-size: 0.8rem; color: #aaa; font-style: italic; min-height: 24px; }
    #input-area { display: flex; padding: 12px; gap: 10px; background: #0f3460; }
    #msg-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: none; background: #16213e; color: #eee; font-size: 0.95rem; }
    #send-btn { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <h1>💬 RealTime Chat</h1>
  <p style="color:#aaa; margin-bottom:16px;">Enter your name to start chatting</p>
  <input id="username-input" type="text" placeholder="Your name" maxlength="30" />
  <br/>
  <button onclick="joinChat()">Join Chat</button>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen" style="display:none; width:100%; max-width:900px; height:90vh; display:none; flex-direction:row; gap:12px; padding:12px;">
  <div id="sidebar">
    <h3>Rooms</h3>
    <button class="room-btn active" onclick="joinRoom('general')">General</button>
    <button class="room-btn" onclick="joinRoom('tech')">Tech</button>
    <button class="room-btn" onclick="joinRoom('random')">Random</button>
    <hr style="border-color:#0f3460; margin:8px 0"/>
    <h3>Online</h3>
    <div id="online-users"></div>
  </div>
  <div id="chat-area">
    <div id="chat-header"># general</div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>
    <div id="input-area">
      <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Socket.IO client (loaded from our server) -->
<script src="/socket.io/socket.io.js"></script>
<script>
  let socket;
  let currentRoom = 'general';
  let myUsername = '';
  let typingTimeout;

  function joinChat() {
    const input = document.getElementById('username-input');
    myUsername = input.value.trim();
    if (!myUsername) return alert('Please enter a name');

    // Connect to Socket.IO server with username in auth
    socket = io({ auth: { username: myUsername } });

    socket.on('connect', () => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      joinRoom('general');
    });

    socket.on('connect_error', (err) => alert('Connection error: ' + err.message));

    // Receive last 50 messages when joining a room
    socket.on('message_history', (messages) => {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      messages.forEach(addMessage);
      container.scrollTop = container.scrollHeight;
    });

    // New message received in real time
    socket.on('new_message', (msg) => {
      addMessage(msg);
      document.getElementById('messages').scrollTop = 9999999;
    });

    // Someone joined the room
    socket.on('user_joined', ({ username, onlineUsers }) => {
      addSystemMessage(`${username} joined the room`);
      updateOnlineUsers(onlineUsers);
    });

    // Someone left the room
    socket.on('user_left', ({ username, onlineUsers }) => {
      addSystemMessage(`${username} left the room`);
      updateOnlineUsers(onlineUsers);
    });

    // Typing indicator
    socket.on('user_typing', ({ username, isTyping }) => {
      const el = document.getElementById('typing-indicator');
      el.textContent = isTyping ? `${username} is typing...` : '';
    });

    socket.on('message_error', ({ error }) => alert(error));
  }

  function joinRoom(room) {
    currentRoom = room;
    socket.emit('join_room', room);
    document.getElementById('chat-header').textContent = '# ' + room;
    document.querySelectorAll('.room-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === room);
    });
    document.getElementById('messages').innerHTML = '';
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content) return;
    socket.emit('send_message', { room: currentRoom, content });
    input.value = '';
    socket.emit('typing', { room: currentRoom, isTyping: false });
  }

  // Send on Enter key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.getElementById('msg-input') === document.activeElement) {
      sendMessage();
    }
  });

  // Typing indicator — emits while user types, stops after 1.5s of inactivity
  document.addEventListener('input', (e) => {
    if (e.target.id !== 'msg-input') return;
    socket.emit('typing', { room: currentRoom, isTyping: true });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      socket.emit('typing', { room: currentRoom, isTyping: false });
    }, 1500);
  });

  function addMessage({ username, content, created_at, createdAt }) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    const isMe = username === myUsername;
    div.className = 'message ' + (isMe ? 'mine' : 'theirs');
    const time = new Date(created_at || createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `<div class="meta">${isMe ? 'You' : username} · ${time}</div>${content}`;
    container.appendChild(div);
  }

  function addSystemMessage(text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = 9999999;
  }

  function updateOnlineUsers(users) {
    const el = document.getElementById('online-users');
    el.innerHTML = users.map(u => `<div class="online-user">🟢 ${u}</div>`).join('');
  }
</script>
</body>
</html>
