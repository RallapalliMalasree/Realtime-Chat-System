events {
  worker_connections 1024;
}

http {
  upstream chat_servers {
    # ip_hash ensures a user always reconnects to the same server
    # This is important for WebSocket session continuity
    ip_hash;

    server chat1:3001;
    server chat2:3002;
    server chat3:3003;
  }

  server {
    listen 80;

    location / {
      proxy_pass         http://chat_servers;
      proxy_http_version 1.1;

      # These two headers are REQUIRED for WebSocket connections
      # Without them Nginx would reject the WebSocket upgrade request
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";

      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      # WebSocket connections stay open — increase timeout
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
