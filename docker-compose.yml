services:

  # ─── PostgreSQL — stores all messages permanently ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: chat_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis — Pub/Sub broker between server instances ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Chat Server Instance 1 ────────────────────────────────────────────────
  chat1:
    build: .
    container_name: chat_server1
    env_file: .env
    environment:
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Chat Server Instance 2 ────────────────────────────────────────────────
  chat2:
    build: .
    container_name: chat_server2
    env_file: .env
    environment:
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Chat Server Instance 3 ────────────────────────────────────────────────
  chat3:
    build: .
    container_name: chat_server3
    env_file: .env
    environment:
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx — WebSocket-aware load balancer ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chat_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - chat1
      - chat2
      - chat3

volumes:
  pg_data:
